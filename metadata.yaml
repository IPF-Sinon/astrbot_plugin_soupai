name: astrbot_plugin_soupai
desc: AI 海龟汤推理游戏插件，支持自动生成谜题、智能判断、验证系统、智能提示、存储库管理等功能。网络题库包含近300道海龟汤，还在持续更新中。
version: v1.0.7
author: KONpiGG
repo: https://github.com/KONpiGG/astrbot_plugin_soupai

# 事件监听器配置
event_listener:
  default_priority: 100  # 确保高于默认 reply 插件
  stop_propagation: false  # 不阻止其他插件继续处理

# 插件配置文件
conf_schema: _conf_schema.json
